name: Automated Tiki Incremental Crawler

on:
  schedule:
    - cron: '22 * * * *'  # Cứ mỗi 2 tiếng hệ thống tự chạy 1 lần
  workflow_dispatch:      # Kích hoạt nút bấm chạy thủ công

jobs:
  crawl-and-sync:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository code
      uses: actions/checkout@v3

    - name: Set up Python environment
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install core dependencies
      run: |
        python -m pip install --upgrade pip
        pip install google-api-python-client google-auth-httplib2 google-auth-oauthlib pandas requests

    - name: Execute Crawler Script
      env:
        GOOGLE_DRIVE_TOKEN: ${{ secrets.GOOGLE_DRIVE_TOKEN }}
      run: |
        python tiki_crawler.py
